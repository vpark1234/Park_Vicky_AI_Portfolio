<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive Financial Health Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.0/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #F5FAFC; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {
      BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer
    } = Recharts;

    const { useState } = React;


const FinancialDashboard = () => {
const [activeView, setActiveView] = useState('overview');

const ns = {
lightBlue: '#F5FAFC',
darkBlue: '#194058',
white: '#FFFFFF',
ocean180: '#13212C',
ocean150: '#264759',
ocean120: '#36677D',
ocean60: '#94BFCE',
ocean30: '#E7F2F5',
ocean10: '#F5FAFC',
mint: '#86D4C0',
lavender: '#A89BC9',
peach: '#FFB199',
coral: '#FF8675',
sunlight: '#FFD580',
rust: '#9E621A',
teal: '#1A789B',
green: '#426D2A'
};

const cardFrame = {
padding: '6px',
borderRadius: '13px',
background: 'conic-gradient(from 52deg at 50.81% 52.69%, #975d6b 0deg, #d4976c 36.34deg, #ffa5a5 72.69deg, #997faa 109deg, #376980 264.8deg, #975d6b 360deg)',
display: 'flex',
marginBottom: '1.5rem',
boxShadow: '0px 6px 12px 0px rgba(0, 0, 0, 0.15)'
};

const cardInner = {
background: ns.white,
borderRadius: '7px',
padding: '1.5rem',
border: `1px solid ${ns.ocean30}`,
boxShadow: '0 2px 6px rgba(0, 0, 0, 0.06)',
flex: 1
};

const metricCard = (bgColor, textColor = ns.white) => ({
background: bgColor,
color: textColor,
borderRadius: '12px',
padding: '1.5rem',
textAlign: 'center',
boxShadow: '0 2px 8px rgba(19, 33, 44, 0.08)'
});

// P&L Data by Subsidiary (Nov 2024 - Nov 2025)
const plData = {
'Germany': { revenue: 9584261, cogs: 2802323.55, expense: 1821462.90 },
'US West': { revenue: 10245475, cogs: 4296620.48, expense: 2878251.64 },
'United Kingdom': { revenue: 7742930, cogs: 3326981.71, expense: 2043055.52 },
'US East': { revenue: 0, cogs: 0, expense: 2700 },
'Parent Company': { revenue: 0, cogs: 0, expense: 10000 }
};

const totalRevenue = Object.values(plData).reduce((sum, s) => sum + s.revenue, 0);
const totalCOGS = Object.values(plData).reduce((sum, s) => sum + s.cogs, 0);
const totalExpenses = Object.values(plData).reduce((sum, s) => sum + s.expense, 0);
const grossProfit = totalRevenue - totalCOGS;
const netIncome = totalRevenue - totalCOGS - totalExpenses;
const grossMargin = (grossProfit / totalRevenue) * 100;
const netMargin = (netIncome / totalRevenue) * 100;

// Liquidity Data
const arData = {
total: 36968025.82,
current: 3579015.02,
days_1_30: 4638543.14,
days_31_60: 5776590.36,
days_over_60: 22834869.97
};

const apData = {
total: 17514151.67,
not_yet_due: 1839205.57,
days_1_30: 1722646.75,
days_31_60: 1410543.30,
days_over_60: 12541756.05
};

const cashBalance = 7647768.89; // Current cumulative cash

// Balance Sheet Summary (as of Nov 12, 2025)
const balanceSheet = {
currentAssets: {
cash: 24437231.88,  // Sum of all bank accounts + undeposited
ar: 203850.40,
inventory: 440128,
other: 61569
},
currentLiabilities: {
ap: 2447920,
other: 670478.50
}
};

const totalCurrentAssets = Object.values(balanceSheet.currentAssets).reduce((sum, v) => sum + v, 0);
const totalCurrentLiabilities = Object.values(balanceSheet.currentLiabilities).reduce((sum, v) => sum + v, 0);
const currentRatio = totalCurrentAssets / totalCurrentLiabilities;
const quickRatio = (balanceSheet.currentAssets.cash + balanceSheet.currentAssets.ar) / totalCurrentLiabilities;

// DSO & DPO Calculations
const dso = (arData.total / totalRevenue) * 365;
const dpo = (apData.total / totalCOGS) * 365;

// Monthly Trends (Last 13 months consolidated)
const monthlyTrends = [
{ month: '2024-11', revenue: 1638209, cogs: 737141.68, expenses: 452300.82, netIncome: 448766.50 },
{ month: '2024-12', revenue: 1659063, cogs: 737431.68, expenses: 433886.82, netIncome: 487744.50 },
{ month: '2025-01', revenue: 1678917, cogs: 737721.68, expenses: 444425.82, netIncome: 496769.50 },
{ month: '2025-02', revenue: 1698771, cogs: 738011.68, expenses: 447516.82, netIncome: 513242.50 },
{ month: '2025-03', revenue: 1719135, cogs: 738301.68, expenses: 453631.82, netIncome: 527201.50 },
{ month: '2025-04', revenue: 1762054, cogs: 738591.68, expenses: 464687.92, netIncome: 558774.40 },
{ month: '2025-05', revenue: 1789008, cogs: 738881.68, expenses: 468170.12, netIncome: 581956.20 },
{ month: '2025-06', revenue: 1810862, cogs: 739171.68, expenses: 474985.12, netIncome: 596705.20 },
{ month: '2025-07', revenue: 1989289, cogs: 889875.08, expenses: 481800.12, netIncome: 617613.80 },
{ month: '2025-08', revenue: 2743854, cogs: 1034128.18, expenses: 489570.94, netIncome: 1220155.88 },
{ month: '2025-09', revenue: 3033713, cogs: 1030221.68, expenses: 600580.50, netIncome: 1402910.82 },
{ month: '2025-10', revenue: 2953289, cogs: 810171.68, expenses: 808310.23, netIncome: 1334807.09 },
{ month: '2025-11', revenue: 3075502, cogs: 756275.68, expenses: 734904.01, netIncome: 1584322.31 }
];

// Subsidiary Performance
const subsidiaryData = Object.entries(plData).map(([name, data]) => ({
subsidiary: name,
revenue: data.revenue,
cogs: data.cogs,
expenses: data.expense,
grossProfit: data.revenue - data.cogs,
netIncome: data.revenue - data.cogs - data.expense,
grossMargin: ((data.revenue - data.cogs) / data.revenue) * 100,
netMargin: ((data.revenue - data.cogs - data.expense) / data.revenue) * 100
})).filter(s => s.revenue > 0).sort((a, b) => b.netIncome - a.netIncome);

// Cash Flow Monthly
const cashFlowData = [
{ month: '2024-11', flow: -571288.29, cumulative: -571288.29 },
{ month: '2024-12', flow: -596423.11, cumulative: -1167711.40 },
{ month: '2025-01', flow: -572275.92, cumulative: -1739987.32 },
{ month: '2025-02', flow: 6618498.60, cumulative: 4878511.28 },
{ month: '2025-03', flow: -573263.54, cumulative: 4305247.74 },
{ month: '2025-04', flow: -573757.36, cumulative: 3731490.38 },
{ month: '2025-05', flow: -574251.17, cumulative: 3157239.21 },
{ month: '2025-06', flow: -68744.98, cumulative: 3088494.23 },
{ month: '2025-07', flow: 2081955.27, cumulative: 5170449.50 },
{ month: '2025-08', flow: -501619.54, cumulative: 4668829.96 },
{ month: '2025-09', flow: 1776441.91, cumulative: 6445271.87 },
{ month: '2025-10', flow: 804783.63, cumulative: 7250055.50 },
{ month: '2025-11', flow: 397713.39, cumulative: 7647768.89 }
];

// AR Aging
const arAging = [
{ category: 'Current', amount: 3579015.02, pct: 9.7 },
{ category: '1-30 Days', amount: 4638543.14, pct: 12.5 },
{ category: '31-60 Days', amount: 5776590.36, pct: 15.6 },
{ category: '60+ Days', amount: 22834869.97, pct: 61.8 }
];

// Monthly burn & runway calculation
const avgMonthlyExpenses = totalExpenses / 13;
const burnRate = avgMonthlyExpenses;
const runway = cashBalance / burnRate;

const chartColors = [ns.ocean120, ns.mint, ns.lavender, ns.peach, ns.coral, ns.sunlight];
const tooltipStyle = {
background: ns.white,
border: `1px solid ${ns.ocean30}`,
borderRadius: '6px',
color: ns.ocean180,
boxShadow: '0 2px 6px rgba(0, 0, 0, 0.06)'
};

const formatCurrency = (val) => {
if (Math.abs(val) >= 1000000) return `$${(val / 1000000).toFixed(1)}M`;
if (Math.abs(val) >= 1000) return `$${(val / 1000).toFixed(0)}K`;
return `$${val.toFixed(0)}`;
};

const btnStyle = (active) => ({
background: active ? ns.ocean120 : ns.white,
color: active ? ns.white : ns.ocean120,
border: `1px solid ${ns.ocean120}`,
borderRadius: '8px',
padding: '0.5rem 1rem',
fontSize: '0.875rem',
fontWeight: 500,
cursor: 'pointer',
fontFamily: 'inherit',
marginRight: '0.5rem'
});

return (
<div style={{
fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
minHeight: '100vh'
}}>

  {/* HEADER SECTION - Light Blue */}
  <section style={{ background: ns.lightBlue, padding: '3rem 2rem' }}>
    <div style={{ maxWidth: '1000px', margin: '0 auto' }}>
      <h1 style={{ color: ns.ocean180, fontSize: '2.25rem', fontWeight: 600, marginBottom: '0.5rem' }}>
        Executive Financial Health Dashboard
      </h1>
      <p style={{ color: ns.ocean150, fontSize: '1rem', marginBottom: '2rem' }}>
        Comprehensive Financial Analysis | Nov 2024 - Nov 2025 YTD
      </p>
      
      {/* Navigation */}
      <div style={{ marginBottom: '2rem' }}>
        <button onClick={() => setActiveView('overview')} style={btnStyle(activeView === 'overview')}>
          Overview
        </button>
        <button onClick={() => setActiveView('subsidiary')} style={btnStyle(activeView === 'subsidiary')}>
          Subsidiary Analysis
        </button>
        <button onClick={() => setActiveView('liquidity')} style={btnStyle(activeView === 'liquidity')}>
          Cash &amp; Liquidity
        </button>
        <button onClick={() => setActiveView('profitability')} style={btnStyle(activeView === 'profitability')}>
          Profitability
        </button>
      </div>
      
      {/* Executive KPIs */}
      <div style={{
        display: 'grid',
        gap: '1.5rem',
        gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
        marginBottom: '2rem'
      }}>
        <div style={metricCard(ns.ocean120)}>
          <div style={{ fontSize: '0.875rem', marginBottom: '0.5rem', opacity: 0.9 }}>Total Revenue</div>
          <div style={{ fontSize: '2rem', fontWeight: 600 }}>{formatCurrency(totalRevenue)}</div>
          <div style={{ fontSize: '0.75rem', opacity: 0.8, marginTop: '0.25rem' }}>13-Month Period</div>
        </div>
        
        <div style={metricCard(ns.mint)}>
          <div style={{ fontSize: '0.875rem', marginBottom: '0.5rem', opacity: 0.9 }}>Gross Profit</div>
          <div style={{ fontSize: '2rem', fontWeight: 600 }}>{formatCurrency(grossProfit)}</div>
          <div style={{ fontSize: '0.75rem', opacity: 0.8, marginTop: '0.25rem' }}>{grossMargin.toFixed(1)}% Margin</div>
        </div>
        
        <div style={metricCard(ns.lavender)}>
          <div style={{ fontSize: '0.875rem', marginBottom: '0.5rem', opacity: 0.9 }}>Net Income</div>
          <div style={{ fontSize: '2rem', fontWeight: 600 }}>{formatCurrency(netIncome)}</div>
          <div style={{ fontSize: '0.75rem', opacity: 0.8, marginTop: '0.25rem' }}>{netMargin.toFixed(1)}% Margin</div>
        </div>
        
        <div style={metricCard(ns.peach)}>
          <div style={{ fontSize: '0.875rem', marginBottom: '0.5rem', opacity: 0.9 }}>Cash Position</div>
          <div style={{ fontSize: '2rem', fontWeight: 600 }}>{formatCurrency(cashBalance)}</div>
          <div style={{ fontSize: '0.75rem', opacity: 0.8, marginTop: '0.25rem' }}>{runway.toFixed(1)} Months Runway</div>
        </div>
        
        <div style={metricCard(currentRatio >= 2 ? ns.mint : currentRatio >= 1 ? ns.sunlight : ns.coral)}>
          <div style={{ fontSize: '0.875rem', marginBottom: '0.5rem', opacity: 0.9 }}>Current Ratio</div>
          <div style={{ fontSize: '2rem', fontWeight: 600 }}>{currentRatio.toFixed(2)}</div>
          <div style={{ fontSize: '0.75rem', opacity: 0.8, marginTop: '0.25rem' }}>
            {currentRatio >= 2 ? 'STRONG' : currentRatio >= 1 ? 'ADEQUATE' : 'RISK'}
          </div>
        </div>
        
        <div style={metricCard(dso <= 45 ? ns.mint : dso <= 60 ? ns.sunlight : ns.coral)}>
          <div style={{ fontSize: '0.875rem', marginBottom: '0.5rem', opacity: 0.9 }}>Days Sales Outstanding</div>
          <div style={{ fontSize: '2rem', fontWeight: 600 }}>{dso.toFixed(0)}</div>
          <div style={{ fontSize: '0.75rem', opacity: 0.8, marginTop: '0.25rem' }}>
            {dso <= 45 ? 'EXCELLENT' : dso <= 60 ? 'ACCEPTABLE' : 'ATTENTION NEEDED'}
          </div>
        </div>
      </div>
    </div>
  </section>
  
  {/* OVERVIEW VIEW */}
  {activeView === 'overview' && (
    <section style={{ background: ns.darkBlue, padding: '3rem 2rem' }}>
      <div style={{ maxWidth: '1400px', margin: '0 auto' }}>
        
        {/* Summary Stats */}
        <div style={{ display: 'flex', gap: '1rem', marginBottom: '2rem' }}>
          <div style={{
            flex: 1,
            background: ns.rust,
            color: ns.white,
            padding: '0.75rem 1rem',
            borderRadius: '4px',
            fontSize: '0.875rem',
            fontWeight: 500
          }}>
            CRITICAL: $22.8M in AR >60 days overdue (61.8% of total receivables)
          </div>
          <div style={{
            flex: 1,
            background: ns.teal,
            color: ns.white,
            padding: '0.75rem 1rem',
            borderRadius: '4px',
            fontSize: '0.875rem',
            fontWeight: 500
          }}>
            Strong Revenue Growth: +32% Feb spike, sustained through Q3-Q4
          </div>
        </div>
        
        <h2 style={{ color: ns.white, fontSize: '1.5rem', fontWeight: 600, marginBottom: '1.5rem' }}>
          Financial Performance Trends
        </h2>
        
        {/* Revenue & Profitability Trend */}
        <div style={cardFrame}>
          <div style={cardInner}>
            <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem' }}>
              Monthly Revenue &amp; Net Income Trend
            </h3>
            <ResponsiveContainer width="100%" height={300}>
              <LineChart data={monthlyTrends}>
                <CartesianGrid strokeDasharray="3 3" stroke={ns.ocean30} />
                <XAxis dataKey="month" stroke={ns.ocean150} />
                <YAxis stroke={ns.ocean150} tickFormatter={formatCurrency} />
                <Tooltip contentStyle={tooltipStyle} formatter={(val) => formatCurrency(val)} />
                <Legend />
                <Line type="monotone" dataKey="revenue" stroke={ns.ocean120} strokeWidth={2} name="Revenue" />
                <Line type="monotone" dataKey="netIncome" stroke={ns.mint} strokeWidth={2} name="Net Income" />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
        
        {/* Two-Column Grid */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem' }}>
          
          {/* Revenue by Subsidiary */}
          <div style={cardFrame}>
            <div style={cardInner}>
              <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem' }}>
                Revenue Distribution
              </h3>
              <ResponsiveContainer width="100%" height={250}>
                <PieChart>
                  <Pie
                    data={subsidiaryData}
                    cx="50%"
                    cy="50%"
                    outerRadius={80}
                    dataKey="revenue"
                    nameKey="subsidiary"
                    label={(entry) => `${((entry.revenue / totalRevenue) * 100).toFixed(1)}%`}
                  >
                    {subsidiaryData.map((entry, index) => (
                      <Cell key={index} fill={chartColors[index % chartColors.length]} />
                    ))}
                  </Pie>
                  <Tooltip contentStyle={tooltipStyle} formatter={(val) => formatCurrency(val)} />
                  <Legend />
                </PieChart>
              </ResponsiveContainer>
            </div>
          </div>
          
          {/* Margin Performance */}
          <div style={cardFrame}>
            <div style={cardInner}>
              <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem' }}>
                Margin Performance by Subsidiary
              </h3>
              <ResponsiveContainer width="100%" height={250}>
                <BarChart data={subsidiaryData}>
                  <CartesianGrid strokeDasharray="3 3" stroke={ns.ocean30} />
                  <XAxis dataKey="subsidiary" stroke={ns.ocean150} />
                  <YAxis stroke={ns.ocean150} tickFormatter={(v) => `${v}%`} />
                  <Tooltip contentStyle={tooltipStyle} formatter={(val) => `${val.toFixed(1)}%`} />
                  <Legend />
                  <Bar dataKey="grossMargin" fill={ns.ocean120} name="Gross Margin %" />
                  <Bar dataKey="netMargin" fill={ns.mint} name="Net Margin %" />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
        
      </div>
    </section>
  )}
  
  {/* SUBSIDIARY VIEW */}
  {activeView === 'subsidiary' && (
    <section style={{ background: ns.lightBlue, padding: '3rem 2rem' }}>
      <div style={{ maxWidth: '1400px', margin: '0 auto' }}>
        <h2 style={{ color: ns.ocean180, fontSize: '1.5rem', fontWeight: 600, marginBottom: '1.5rem' }}>
          Subsidiary Performance Analysis
        </h2>
        
        <div style={cardFrame}>
          <div style={cardInner}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background: ns.ocean10 }}>
                  <th style={{
                    padding: '1rem',
                    textAlign: 'left',
                    fontWeight: 600,
                    color: ns.ocean150,
                    borderBottom: `1px solid ${ns.ocean30}`,
                    fontSize: '0.875rem'
                  }}>Subsidiary</th>
                  <th style={{
                    padding: '1rem',
                    textAlign: 'right',
                    fontWeight: 600,
                    color: ns.ocean150,
                    borderBottom: `1px solid ${ns.ocean30}`,
                    fontSize: '0.875rem'
                  }}>Revenue</th>
                  <th style={{
                    padding: '1rem',
                    textAlign: 'right',
                    fontWeight: 600,
                    color: ns.ocean150,
                    borderBottom: `1px solid ${ns.ocean30}`,
                    fontSize: '0.875rem'
                  }}>COGS</th>
                  <th style={{
                    padding: '1rem',
                    textAlign: 'right',
                    fontWeight: 600,
                    color: ns.ocean150,
                    borderBottom: `1px solid ${ns.ocean30}`,
                    fontSize: '0.875rem'
                  }}>Gross Profit</th>
                  <th style={{
                    padding: '1rem',
                    textAlign: 'right',
                    fontWeight: 600,
                    color: ns.ocean150,
                    borderBottom: `1px solid ${ns.ocean30}`,

                  }}>Gross Margin %</th>
                  <th style={{
                    padding: '1rem',
                    textAlign: 'right',
                    fontWeight: 600,

                  }}>Net Margin %</th>

                    <td style={{ padding: '1rem', textAlign: 'right', color: ns.coral, fontSize: '0.875rem' }}>

                    </td>
                    <td style={{ padding: '1rem', textAlign: 'right', color: ns.ocean150, fontSize: '0.875rem' }}>
                      {row.grossMargin.toFixed(1)}%
                    </td>
                    <td style={{ padding: '1rem', textAlign: 'right', color: ns.coral, fontSize: '0.875rem' }}>
                      {formatCurrency(row.expenses)}
                    </td>
                    <td style={{ padding: '1rem', textAlign: 'right', color: row.netIncome >= 0 ? ns.mint : ns.coral, fontSize: '0.875rem', fontWeight: 600 }}>
                      {formatCurrency(row.netIncome)}
                    </td>
                    <td style={{ padding: '1rem', textAlign: 'right', color: ns.ocean150, fontSize: '0.875rem' }}>
                      {row.netMargin.toFixed(1)}%
                    </td>

                <tr style={{ background: ns.ocean120, borderTop: `2px solid ${ns.ocean120}` }}>

                  <td style={{ padding: '1rem', textAlign: 'right', color: ns.white, fontSize: '0.875rem', fontWeight: 600 }}>
