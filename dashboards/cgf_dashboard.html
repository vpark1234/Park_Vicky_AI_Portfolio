<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nonprofit Program Efficacy Dashboard — FY25</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.0/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const {
      LineChart, Line, BarChart, Bar, ScatterChart, Scatter,
      XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Cell
    } = Recharts;

    const { useState, useEffect } = React;

    // ── Lucide icons as inline SVG components ──────────────────────────────────
    const Icon = ({ d, size = 18, color = 'currentColor', style: s = {}, ...rest }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        style={{ display: 'inline-block', verticalAlign: 'middle', flexShrink: 0, ...s }} {...rest}>
        {d}
      </svg>
    );

    const TrendingUp    = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>} />;
    const AlertCircle   = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />;
    const CheckCircle   = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
    const Target        = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>} />;
    const DollarSign    = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>} />;
    const Users         = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />;
    const Award         = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>} />;
    const Book          = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>} />;
    const Heart         = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></>} />;
    const Briefcase     = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>} />;
    const Download      = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
    const RefreshCw     = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>} />;
    const Mail          = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>} />;
    const X             = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
    const ChevronDown   = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<polyline points="6 9 12 15 18 9"/>} />;
    const ChevronUp     = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<polyline points="18 15 12 9 6 15"/>} />;
    const FileText      = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>} />;
    const Send          = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>} />;
    const Eye           = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>} />;
    const CheckSquare   = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>} />;
    const Square        = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>} />;
    const Loader        = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></>} />;
    const ExternalLink  = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>} />;
    const Database      = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>} />;
    const Activity      = ({size,color,style}) => <Icon size={size} color={color} style={style} d={<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>} />;

    // ── Color palette ──────────────────────────────────────────────────────────
    const COLORS = {
      navy500: '#003d7a', navy700: '#1a3f5c', navy900: '#0a2540',
      navy100: '#d1dfe8', navy50: '#e8f1f8', green700: '#2d8a3d',
      yellow500: '#f1d301', red500: '#d62828', orange500: '#f77f00',
      purple500: '#7b2cbf', neutral: '#f5f5f5', white: '#FFFFFF'
    };

    const NS_BASE = 'https://demo.netsuite.com';
    const getNetSuiteUrl = (type, id) => {
      const urls = {
        department: `/app/common/otherlists/departmenttype.nl?id=${id}`,
        grant: `/app/common/custom/custrecord.nl?rectype=customrecord_cseg_npo_grant_segm&id=${id}`,
        transaction: `/app/accounting/transactions/transaction.nl?id=${id}`,
        search: `/app/common/search/search.nl?cu=T&id=${id}`
      };
      return `${NS_BASE}${urls[type] || ''}`;
    };

    const HISTORICAL_DATA = {
      fy24: {
        programs: {
          education: { childrenServed: 450, totalCost: 145000, costPerChild: 322, outcomes: { gradeImprovement: 0.75 } },
          enrichment: { childrenServed: 560, totalCost: 65000, costPerChild: 116, outcomes: { satisfaction: 4.5 } },
          normalcy: { childrenServed: 170, totalCost: 28000, costPerChild: 165, outcomes: { stabilityRate: 0.68 } },
          youth: { childrenServed: 8, totalCost: 12000, costPerChild: 1500, outcomes: { employmentRate: 0.60 } },
          gal: { childrenServed: 700, advocatesSupported: 120, totalCost: 32000, costPerChild: 46, outcomes: { satisfaction: 4.5 } },
          awards: { childrenServed: 65, totalCost: 4500, costPerChild: 69, outcomes: { motivationScore: 0.85 } }
        }
      },
      fy25: {
        programs: {
          education: {
            childrenServed: 496, totalCost: 162255, costPerChild: 327, requestsFulfilled: 486, totalRequests: 496,
            outcomes: { gradeImprovement: 0.78 }, dedicatedGrants: 4, recurringDonorPercent: 35,
            nsLinks: { deptId: '101', grants: [
              { id: '5001', name: 'Foundation Education Grant' },
              { id: '5002', name: 'Corporate Literacy Initiative' }
            ]}
          },
          enrichment: {
            childrenServed: 616, totalCost: 71890, costPerChild: 117, requestsFulfilled: 585, totalRequests: 616,
            outcomes: { satisfaction: 4.7 }, dedicatedGrants: 2, recurringDonorPercent: 45,
            nsLinks: { deptId: '102', grants: [{ id: '5010', name: 'Enrichment Program Fund' }] }
          },
          normalcy: {
            childrenServed: 83, totalCost: 13473, costPerChild: 162, requestsFulfilled: 71, totalRequests: 83,
            outcomes: { stabilityRate: 0.72 }, dedicatedGrants: 1, recurringDonorPercent: 25,
            nsLinks: { deptId: '103', grants: [{ id: '5020', name: 'Essential Needs Fund' }] }
          },
          youth: {
            childrenServed: 13, totalCost: 15136, costPerChild: 1164, requestsFulfilled: 12, totalRequests: 13,
            outcomes: { employmentRate: 0.64 }, dedicatedGrants: 1, recurringDonorPercent: 20,
            nsLinks: { deptId: '104', grants: [{ id: '5030', name: 'Youth Development Grant' }] }
          },
          gal: {
            advocatesSupported: 148, totalCost: 38000, childrenServed: 700, costPerAdvocate: 257,
            outcomes: { satisfaction: 4.7 }, dedicatedGrants: 3, recurringDonorPercent: 40,
            nsLinks: { deptId: '105', grants: [{ id: '5040', name: 'Advocate Training Fund' }] }
          },
          awards: {
            childrenServed: 72, totalCost: 5200, costPerChild: 72, outcomes: { motivationScore: 0.89 },
            dedicatedGrants: 1, recurringDonorPercent: 30,
            nsLinks: { deptId: '106', grants: [{ id: '5050', name: 'Academic Achievement Fund' }] }
          }
        }
      }
    };

    const MOCK_NS_DATA = {
      grants: [
        { id: '5001', name: 'Foundation Education Grant', amount: 50000, expended: 38000, remaining: 12000, endDate: '2025-06-30', program: 'education' },
        { id: '5002', name: 'Corporate Literacy Initiative', amount: 75000, expended: 62000, remaining: 13000, endDate: '2025-09-30', program: 'education' },
        { id: '5010', name: 'Enrichment Program Fund', amount: 40000, expended: 35000, remaining: 5000, endDate: '2025-12-31', program: 'enrichment' },
        { id: '5020', name: 'Essential Needs Fund', amount: 20000, expended: 13473, remaining: 6527, endDate: '2025-12-31', program: 'normalcy' },
        { id: '5030', name: 'Youth Development Grant', amount: 25000, expended: 15136, remaining: 9864, endDate: '2025-12-31', program: 'youth' }
      ],
      lastSyncTime: new Date().toISOString()
    };

    const calculateScores = (fy24, fy25, capacity) => {
      const costEfficiency = Math.max(0, Math.min(100, 100 - ((fy25.costPerChild - fy24.costPerChild) / fy24.costPerChild * 100)));
      const reach = Math.min(100, (fy25.childrenServed / capacity) * 100);
      const demand = fy25.requestsFulfilled ? (fy25.requestsFulfilled / fy25.totalRequests * 100) : 90;
      const outcome = fy25.outcomes.gradeImprovement ? fy25.outcomes.gradeImprovement * 100 :
                      fy25.outcomes.satisfaction ? (fy25.outcomes.satisfaction / 5) * 100 :
                      fy25.outcomes.stabilityRate ? fy25.outcomes.stabilityRate * 100 :
                      fy25.outcomes.employmentRate ? fy25.outcomes.employmentRate * 100 :
                      fy25.outcomes.motivationScore ? fy25.outcomes.motivationScore * 100 : 75;
      const growth = Math.max(0, Math.min(100, 50 + ((fy25.childrenServed - fy24.childrenServed) / fy24.childrenServed * 100)));
      const stability = Math.min(100, (fy25.dedicatedGrants * 10) + (fy25.recurringDonorPercent * 0.5));
      const composite = Math.round(
        costEfficiency * 0.25 + reach * 0.20 + demand * 0.15 +
        outcome * 0.25 + growth * 0.10 + stability * 0.05
      );
      return { costEfficiency, reach, demand, outcome, growth, stability, composite };
    };

    const processPrograms = () => {
      const configs = [
        { id: 'education', name: 'Education Support', icon: Book, color: COLORS.navy500, capacity: 450 },
        { id: 'enrichment', name: 'Enrichment', icon: Heart, color: COLORS.green700, capacity: 550 },
        { id: 'normalcy', name: 'Normalcy', icon: Users, color: COLORS.yellow500, capacity: 100 },
        { id: 'youth', name: 'Youth Transition', icon: Briefcase, color: COLORS.orange500, capacity: 20 },
        { id: 'gal', name: 'GAL Support', icon: Award, color: COLORS.purple500, capacity: 150 },
        { id: 'awards', name: 'Academic Awards', icon: Target, color: COLORS.navy700, capacity: 80 }
      ];
      return configs.map(cfg => {
        const fy24 = HISTORICAL_DATA.fy24.programs[cfg.id];
        const fy25 = HISTORICAL_DATA.fy25.programs[cfg.id];
        const scores = calculateScores(fy24, fy25, cfg.capacity);
        return Object.assign({}, cfg, { fy24, fy25, scores });
      });
    };

    const generateInsights = (programs) => {
      const costReach = programs.map(p => ({
        name: p.name, ratio: p.scores.costEfficiency / p.scores.reach,
        cost: p.fy25.costPerChild, served: p.fy25.childrenServed
      })).sort((a, b) => b.ratio - a.ratio);
      const top = costReach[0];
      const bottom = costReach[costReach.length - 1];
      return [
        {
          id: 'cost-reach', type: 'opportunity', color: COLORS.green700, icon: TrendingUp,
          title: 'Cost-Reach Efficiency Pattern',
          summary: `${top.name} achieves highest efficiency ratio (${top.ratio.toFixed(2)}) serving ${top.served} children at $${top.cost}/child, while ${bottom.name} shows ${(top.ratio / bottom.ratio).toFixed(1)}x lower efficiency.`,
          narrative: `Analysis reveals compelling inverse relationship between cost efficiency and reach. ${top.name} demonstrates economies of scale through volunteer leverage, standardized curricula, and technology enablement. The $${(bottom.cost - top.cost).toLocaleString()} cost differential per child represents opportunity for model innovation.`,
          recommendations: [
            `Conduct deep-dive study of ${top.name} operational model (Q1 FY26)`,
            'Pilot volunteer-leverage model in Youth Transition (Q2-Q3 FY26)',
            'Expected impact: 15-20% portfolio efficiency improvement'
          ],
          nsLinks: programs.slice(0, 2).map(p => ({
            label: `${p.name} Dept`, url: getNetSuiteUrl('department', p.fy25.nsLinks.deptId)
          }))
        },
        {
          id: 'grant-runway', type: 'attention', color: COLORS.red500, icon: AlertCircle,
          title: 'Grant Runway & Funding Sustainability',
          summary: 'Youth Transition faces HIGH funding risk with 3.2 months runway. Emergency fundraising required.',
          narrative: `Financial sustainability analysis reveals critical gaps. Youth Transition has only $9,864 remaining ($4,728/month burn rate = 3.2 months runway). Nearest grant expires in 47 days. Portfolio manages ${MOCK_NS_DATA.grants.length} active grants totaling $${MOCK_NS_DATA.grants.reduce((s, g) => s + g.amount, 0).toLocaleString()} with $${MOCK_NS_DATA.grants.reduce((s, g) => s + g.remaining, 0).toLocaleString()} remaining capacity.`,
          recommendations: [
            'Emergency fundraising campaign: Target $28K for 6-month buffer (0-30 days)',
            'Grant application sprint: Submit 15+ applications (30-90 days)',
            'Launch monthly giving program: Target 200 donors @ $50/month (3-6 months)'
          ],
          nsLinks: MOCK_NS_DATA.grants.slice(0, 3).map(g => ({
            label: g.name, url: getNetSuiteUrl('grant', g.id)
          }))
        },
        {
          id: 'outcome-roi', type: 'excellence', color: COLORS.navy500, icon: CheckCircle,
          title: 'Outcome Quality ROI Analysis',
          summary: 'Education delivers 3.14 outcome points per $100 invested - 5.1x more efficient than Youth Transition.',
          narrative: `Value-for-money analysis shows outcome quality does not correlate linearly with cost. Education achieves 78/100 outcome quality at $327/child (3.14 points/$100), while Youth Transition achieves 64/100 at $1,164/child (0.61 points/$100). Success factors: 8:1 volunteer-to-staff ratio, standardized curriculum, technology enablement, group delivery model.`,
          recommendations: [
            'Study Education operational model for transferable practices',
            'Implement shared technology platform ($25K investment)',
            'Expected impact: 30-40% reduction in administrative overhead'
          ],
          nsLinks: []
        }
      ];
    };

    const NpDashboard = () => {
      const [programs] = useState(processPrograms());
      const [insights] = useState(generateInsights(processPrograms()));
      const [nsData, setNsData] = useState(MOCK_NS_DATA);
      const [syncing, setSyncing] = useState(false);
      const [expandedInsight, setExpandedInsight] = useState(null);
      const [view, setView] = useState('dashboard');
      const [selectedComponents, setSelectedComponents] = useState([]);
      const [emailRecipients, setEmailRecipients] = useState('');
      const [emailSubject, setEmailSubject] = useState(`Nonprofit FY25 Efficacy Analysis - ${new Date().toLocaleDateString()}`);
      const [selectedDeckSlides, setSelectedDeckSlides] = useState([]);
      const [showReportPreview, setShowReportPreview] = useState(false);
      const [showDeckPreview, setShowDeckPreview] = useState(false);

      const refreshData = async () => {
        setSyncing(true);
        await new Promise(r => setTimeout(r, 1500));
        setNsData(Object.assign({}, MOCK_NS_DATA, { lastSyncTime: new Date().toISOString() }));
        setSyncing(false);
      };

      const getScoreColor = (score) => score >= 76 ? COLORS.green700 : score >= 51 ? COLORS.yellow500 : COLORS.red500;

      // ══════════════════════════════════════════════════════════════════════════
      // DASHBOARD VIEW
      // ══════════════════════════════════════════════════════════════════════════
      if (view === 'dashboard') {
        return (
          <div style={{ background: COLORS.neutral, minHeight: '100vh', padding: '2rem' }}>
            <div style={{ maxWidth: '1400px', margin: '0 auto' }}>
          
            {/* Header */}
            <div style={{ background: COLORS.white, borderRadius: '8px', padding: '2rem', marginBottom: '1.5rem', boxShadow: '0 1px 3px rgba(10,37,64,0.1)' }}>
              <h1 style={{ color: COLORS.navy900, margin: '0 0 0.5rem 0', fontSize: '2rem', fontWeight: 600 }}>
                Nonprofit Program Efficacy Dashboard
              </h1>
              <p style={{ color: COLORS.navy700, margin: 0, fontSize: '1rem' }}>
                FY25 Performance Review with Live ERP Integration
              </p>
            </div>

            {/* Action Bar */}
            <div style={{ background: COLORS.white, borderRadius: '8px', padding: '1rem 2rem', boxShadow: '0 1px 3px rgba(10,37,64,0.1)', marginBottom: '1.5rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' }}>
              <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>
                <button onClick={refreshData} disabled={syncing} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.75rem 1.5rem', background: COLORS.navy500, color: COLORS.white, border: 'none', borderRadius: '6px', fontWeight: 600, cursor: syncing ? 'not-allowed' : 'pointer', opacity: syncing ? 0.6 : 1, fontFamily: 'inherit' }}>
                  <RefreshCw size={18} style={{ animation: syncing ? 'spin 1s linear infinite' : 'none' }} />
                  {syncing ? 'Syncing...' : 'Sync ERP Data'}
                </button>
                <button onClick={() => setView('ai-narrative')} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.75rem 1.5rem', background: COLORS.purple500, color: COLORS.white, border: 'none', borderRadius: '6px', fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>
                  <Activity size={18} />
                  AI Narrative
                </button>
                <button onClick={() => setView('deck-builder')} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.75rem 1.5rem', background: COLORS.orange500, color: COLORS.white, border: 'none', borderRadius: '6px', fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>
                  <Target size={18} />
                  Build Deck
                </button>
                <button onClick={() => setView('builder')} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.75rem 1.5rem', background: COLORS.white, color: COLORS.navy500, border: `2px solid ${COLORS.navy500}`, borderRadius: '6px', fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>
                  <FileText size={18} />
                  Build Report
                </button>
              </div>
              <div style={{ fontSize: '0.85rem', color: COLORS.navy700 }}>
                Last sync: {new Date(nsData.lastSyncTime).toLocaleTimeString()}
              </div>
            </div>

            {/* Program Cards */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(340px, 1fr))', gap: '1.5rem', marginBottom: '1.5rem' }}>
              {programs.map(p => {
                const PIcon = p.icon;
                return (
                  <div key={p.id} style={{ background: COLORS.white, borderRadius: '8px', padding: '1.5rem', boxShadow: '0 1px 3px rgba(10,37,64,0.1)', border: `2px solid ${COLORS.navy100}` }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1rem' }}>

                  <div style={{ background: `linear-gradient(135deg, ${COLORS.navy500} 0%, ${COLORS.purple500} 100%)`, padding: '3rem 2rem', borderRadius: '8px', marginBottom: '2rem', textAlign: 'center', color: COLORS.white }}>
                    <h1 style={{ margin: '0 0 1rem 0', fontSize: '2.8rem', fontWeight: 700 }}>Nonprofit FY25</h1>
                    <h2 style={{ margin: '0 0 2rem 0', fontSize: '1.8rem', fontWeight: 600 }}>Program Efficacy Analysis</h2>
                    <div style={{ height: '2px', background: 'rgba(255,255,255,0.3)', margin: '1.5rem auto', width: '50%' }}></div>
                    <p style={{ margin: '1rem 0 0 0', fontSize: '1.1rem', opacity: 0.95 }}>Comprehensive Strategic Review &amp; FY26 Recommendations</p>
                    <p style={{ margin: '0.75rem 0 0 0', fontSize: '0.95rem', opacity: 0.8 }}>Generated: {new Date().toLocaleDateString()} | Live ERP Data</p>
                  </div>

                  {/* Exec Summary always included */}
                  <div style={{ background: COLORS.white, border: `3px solid ${COLORS.navy500}`, borderRadius: '8px', padding: '2rem', marginBottom: '2rem' }}>
                    <h2 style={{ color: COLORS.navy900, margin: '0 0 1.5rem 0', fontSize: '1.5rem', fontWeight: 600, borderBottom: `2px solid ${COLORS.navy100}`, paddingBottom: '0.75rem' }}>Executive Summary</h2>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '1rem', marginBottom: '1.5rem' }}>
                      {[
                        { label: 'Children Served', value: '700', change: '+16.7% YoY' },
                        { label: 'Total Budget', value: '$600K', change: '+6.1%' },
                        { label: 'Portfolio Score', value: `${Math.round(programs.reduce((s,p) => s+p.scores.composite,0)/programs.length)}/100`, change: '' },
                        { label: 'Requests Fulfilled', value: '1,379', change: '95%' }
                      ].map((m, i) => (
                        <div key={i} style={{ background: COLORS.neutral, padding: '1rem', borderRadius: '6px', textAlign: 'center' }}>
                          <div style={{ fontSize: '0.75rem', color: COLORS.navy700, marginBottom: '0.5rem' }}>{m.label}</div>
                          <div style={{ fontSize: '1.8rem', fontWeight: 700, color: COLORS.navy900 }}>{m.value}</div>
                          {m.change && <div style={{ fontSize: '0.75rem', color: COLORS.green700, marginTop: '0.25rem', fontWeight: 600 }}>{m.change}</div>}
                        </div>
                      ))}
                    </div>
                  </div>

                  {selectedComponents.includes('grants') && (
                    <div style={{ background: COLORS.white, border: `3px solid ${COLORS.red500}`, borderRadius: '8px', padding: '2rem', marginBottom: '2rem' }}>
                      <h2 style={{ color: COLORS.navy900, margin: '0 0 1.5rem 0', fontSize: '1.5rem', fontWeight: 600, borderBottom: `2px solid ${COLORS.navy100}`, paddingBottom: '0.75rem' }}>Grant Portfolio Analysis</h2>
                      <table style={{ width: '100%', fontSize: '0.85rem', borderCollapse: 'collapse' }}>
                        <thead>
                          <tr style={{ background: COLORS.navy500, color: COLORS.white }}>
                            <th style={{ padding: '0.75rem', textAlign: 'left' }}>Grant Name</th>
                            <th style={{ padding: '0.75rem', textAlign: 'right' }}>Amount</th>
                            <th style={{ padding: '0.75rem', textAlign: 'right' }}>Remaining</th>
                            <th style={{ padding: '0.75rem', textAlign: 'center' }}>End Date</th>
                          </tr>
                        </thead>
                        <tbody>
                          {MOCK_NS_DATA.grants.map((g, idx) => (
                            <tr key={g.id} style={{ background: idx % 2 === 0 ? COLORS.white : COLORS.navy50 }}>
                              <td style={{ padding: '0.75rem', color: COLORS.navy900 }}>{g.name}</td>
                              <td style={{ padding: '0.75rem', textAlign: 'right', color: COLORS.navy700 }}>${g.amount.toLocaleString()}</td>
                              <td style={{ padding: '0.75rem', textAlign: 'right', fontWeight: 600, color: g.remaining < 10000 ? COLORS.red500 : COLORS.navy900 }}>${g.remaining.toLocaleString()}</td>
                              <td style={{ padding: '0.75rem', textAlign: 'center', color: COLORS.navy700 }}>{g.endDate}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {/* Recommendations always included */}
                  <div style={{ background: COLORS.white, border: `3px solid ${COLORS.orange500}`, borderRadius: '8px', padding: '2rem', marginBottom: '2rem' }}>
                    <h2 style={{ color: COLORS.navy900, margin: '0 0 1.5rem 0', fontSize: '1.5rem', fontWeight: 600, borderBottom: `2px solid ${COLORS.navy100}`, paddingBottom: '0.75rem' }}>FY26 Strategic Recommendations</h2>
                    <div style={{ display: 'grid', gap: '1.5rem' }}>
                      {[
                        { phase: 'PHASE 1: Immediate (0-30 Days)', color: COLORS.red500, items: ['Emergency fundraising campaign ($75K target)', 'Grant application sprint (15 applications)'] },
                        { phase: 'PHASE 2: Short-Term (30-90 Days)', color: COLORS.yellow500, items: ['Youth Transition pilot redesign', 'Volunteer recruitment (+12)', 'Outcomes measurement system'] },
                        { phase: 'PHASE 3: Medium-Term (3-6 Months)', color: COLORS.green700, items: ['Education expansion to 645 children', 'Monthly giving launch (200 donors)', 'Corporate partnerships (3 secured)'] },
                        { phase: 'PHASE 4: Long-Term (6-12 Months)', color: COLORS.navy500, items: ['Endowment Year 1 ($150K)', 'FY27-29 strategic planning'] }
                      ].map((p, i) => (
                        <div key={i} style={{ background: COLORS.neutral, padding: '1.5rem', borderRadius: '8px', borderLeft: `5px solid ${p.color}` }}>
                          <h3 style={{ color: COLORS.navy900, margin: '0 0 1rem 0', fontSize: '1.1rem' }}>{p.phase}</h3>
                          <ul style={{ margin: 0, paddingLeft: '1.5rem', fontSize: '0.9rem', color: COLORS.navy700, lineHeight: '1.8' }}>
                            {p.items.map((item, j) => <li key={j}>{item}</li>)}
                          </ul>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                <div style={{ position: 'sticky', bottom: 0, background: COLORS.white, borderTop: `3px solid ${COLORS.navy500}`, padding: '1.5rem', display: 'flex', gap: '1rem', justifyContent: 'flex-end' }}>
                  <button onClick={() => setShowReportPreview(false)} style={{ padding: '0.75rem 1.5rem', background: COLORS.white, color: COLORS.navy500, border: `2px solid ${COLORS.navy500}`, borderRadius: '6px', fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>Close Preview</button>
                  <button onClick={() => { setShowReportPreview(false); setView('email'); }}
                    style={{ padding: '0.75rem 2rem', background: COLORS.navy500, color: COLORS.white, border: 'none', borderRadius: '6px', fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '0.5rem', fontFamily: 'inherit' }}>
                    <Mail size={18} /> Continue to Email
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════════════════
  // EMAIL COMPOSER VIEW
  // ══════════════════════════════════════════════════════════════════════════
  return (
    <div style={{ background: COLORS.neutral, minHeight: '100vh', padding: '2rem' }}>
      <div style={{ background: COLORS.white, borderRadius: '8px', padding: '2rem', boxShadow: '0 2px 12px rgba(10,37,64,0.15)', maxWidth: '900px', margin: '0 auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem' }}>
          <h2 style={{ color: COLORS.navy900, margin: 0, fontSize: '1.5rem', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
            <Mail size={24} color={COLORS.navy500} style={{ display: 'inline', marginRight: '0.25rem', verticalAlign: 'middle' }} />
            Send Executive Report
          </h2>
          <button onClick={() => setView('builder')} style={{ background: 'none', border: 'none', color: COLORS.navy700, cursor: 'pointer', padding: '0.5rem' }}>
            <X size={24} />
          </button>
        </div>

        {[
          { label: 'From:', type: 'email', value: 'program.director@nonprofit.org', disabled: true, placeholder: '' },
          { label: 'To:', type: 'text', stateKey: 'recipients', placeholder: 'board@nonprofit.org, leadership@nonprofit.org' },
          { label: 'Subject:', type: 'text', stateKey: 'subject', placeholder: '' }
        ].map((f, i) => (
          <div key={i} style={{ marginBottom: '1.5rem' }}>
            <label style={{ display: 'block', color: COLORS.navy900, fontWeight: 600, marginBottom: '0.5rem' }}>{f.label}</label>
            <input
              type={f.type}
              value={f.disabled ? f.value : f.stateKey === 'recipients' ? emailRecipients : emailSubject}
              onChange={e => f.stateKey === 'recipients' ? setEmailRecipients(e.target.value) : f.stateKey === 'subject' ? setEmailSubject(e.target.value) : null}
              disabled={f.disabled}
              placeholder={f.placeholder}
              style={{ width: '100%', padding: '0.75rem', border: `1px solid ${COLORS.navy100}`, borderRadius: '6px', fontSize: '0.95rem', background: f.disabled ? COLORS.neutral : COLORS.white, fontFamily: 'inherit' }}
            />
          </div>
        ))}

        <div style={{ marginBottom: '1.5rem' }}>
          <label style={{ display: 'block', color: COLORS.navy900, fontWeight: 600, marginBottom: '0.5rem' }}>Message:</label>
          <textarea rows={10} readOnly
            value={`Dear Board Members,\n\nPlease find attached the comprehensive FY25 Program Efficacy Analysis.\n\nHighlights:\n• 700 children served (+16.7% YoY)\n• $600K budget with ${Math.round(programs.reduce((s,p) => s+p.scores.composite,0)/programs.length)} avg efficacy score\n• ${insights.length} strategic insights with actionable recommendations\n\nBest regards,\nProgram Director`}
            style={{ width: '100%', padding: '0.75rem', border: `1px solid ${COLORS.navy100}`, borderRadius: '6px', fontSize: '0.95rem', fontFamily: 'inherit', resize: 'vertical' }} />
        </div>

        <div style={{ background: COLORS.neutral, padding: '1rem', borderRadius: '6px', marginBottom: '1.5rem' }}>
          <p style={{ margin: '0 0 0.5rem 0', color: COLORS.navy900, fontWeight: 600, fontSize: '0.9rem' }}>📎 Attachments:</p>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: COLORS.navy700, fontSize: '0.9rem' }}>
            <FileText size={16} />
            <span>Nonprofit_Efficacy_Report_FY25.pdf (with ERP links)</span>
          </div>
        </div>

        <div style={{ display: 'flex', gap: '1rem', justifyContent: 'flex-end' }}>
          <button onClick={() => setView('builder')} style={{ padding: '0.75rem 1.5rem', background: COLORS.white, color: COLORS.navy500, border: `2px solid ${COLORS.navy500}`, borderRadius: '6px', fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>Back</button>
          <button onClick={() => { alert(`Email sent!\n\nTo: ${emailRecipients}\nFrom: program.director@nonprofit.org\n\nReport attached with ERP hyperlinks.`); setView('dashboard'); }}
            disabled={!emailRecipients}
            style={{ padding: '0.75rem 2rem', background: emailRecipients ? COLORS.green700 : COLORS.navy100, color: COLORS.white, border: 'none', borderRadius: '6px', fontWeight: 600, cursor: emailRecipients ? 'pointer' : 'not-allowed', display: 'flex', alignItems: 'center', gap: '0.5rem', fontFamily: 'inherit' }}>
            <Send size={18} /> Send Email
          </button>
        </div>
      </div>
    </div> 
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(NpDashboard, null)
);

  </script>
</body>
</html>
